# docker-compose.dev.yaml – override by dev mode
# run: make dev
# DB + backend(hot update); frontend in local: `npm run dev`

services:

  backend-svc:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../BackEnd:/app
    environment:
      WEAVIATE_HOST: weaviate
      
  frontend:
    profiles: [disabled]          # local frontends