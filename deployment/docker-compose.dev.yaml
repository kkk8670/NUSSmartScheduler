# docker-compose.dev.yaml – override by dev mode
# run: docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
# DB + backend(hot update); frontend in local: `npm run dev`

services:

  backend:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../BackEnd:/app

  frontend:
    profiles: [disabled]          # local frontends