apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

patches:
  # `storage-patch.yaml` generated by `deploy.sh`, based on OS version
  - path: storage-patch.yaml
    target:
      kind: PersistentVolumeClaim
      name: mysql-pvc
  - path: storage-patch.yaml
    target:
      kind: PersistentVolumeClaim
      name: weaviate-pvc

  - target:
      kind: Ingress
      name: smart-scheduler-ingress
    patch: |-
      - op: replace
        path: /spec/ingressClassName
        value: traefik
      - op: replace
        path: /spec/rules/0/host
        value: smart-scheduler.local