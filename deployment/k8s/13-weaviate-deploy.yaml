apiVersion: apps/v1
kind: Deployment
metadata:
  name: weaviate
  namespace: smart-scheduler
spec:
  replicas: 1
  strategy:
    type: Recreate             # PVC available, must Recreate
  selector:
    matchLabels:
      app: weaviate
  template:
    metadata:
      labels:
        app: weaviate
    spec:
      containers:
        - name: weaviate
          image: cr.weaviate.io/semitechnologies/weaviate:1.26.1
          ports:
            - containerPort: 8080         # HTTP / REST
            - containerPort: 50051        # gRPC
          env:
            - name: AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED
              value: "true"
            - name: PERSISTENCE_DATA_PATH
              value: /var/lib/weaviate
            - name: ENABLE_API_BASED_MODULES
              value: "false"
          volumeMounts:
            - name: weaviate-storage
              mountPath: /var/lib/weaviate
          readinessProbe:
            httpGet:
              path: /v1/.well-known/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: weaviate-storage
          persistentVolumeClaim:
            claimName: weaviate-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: weaviate-svc
  namespace: smart-scheduler
spec:
  selector:
    app: weaviate
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 50051
      targetPort: 50051
