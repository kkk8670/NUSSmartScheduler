apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-scheduler-ingress
  namespace: smart-scheduler
spec:
  ingressClassName: placeholder          # overridden by overlay patch
  rules:
    - host: placeholder.local            # overridden by overlay patch
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80