# ── Default: deny all ingress within namespace ── 
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: smart-scheduler
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# ── Allow: traffic → Frontend ── 
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
  namespace: smart-scheduler
spec:
  podSelector:
    matchLabels:
      app: frontend
  ingress:
    - ports:
        - port: 80

---
# ── Allow: traffic → Backend ── 
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend
  namespace: smart-scheduler
spec:
  podSelector:
    matchLabels:
      app: backend
  ingress:
    - ports:
        - port: 8000

---
# ── Allow: only Backend → MySQL ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mysql-from-backend
  namespace: smart-scheduler
spec:
  podSelector:
    matchLabels:
      app: mysql
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 3306

---
# ── Allow: only Backend → Weaviate ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-weaviate-from-backend
  namespace: smart-scheduler
spec:
  podSelector:
    matchLabels:
      app: weaviate
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 8080
        - port: 50051