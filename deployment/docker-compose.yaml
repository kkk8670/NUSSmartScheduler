# docker-compose.yaml – basic setting
#   pre run: ln -s ../.env .env
# 
#   infra (only DB):   make infra
#   dev (DB + be):   make dev
#   prod (fe + be + DB):   make prod

services:

  frontend-svc:
    build:
      context: ../FrontEnd
      args:
        VITE_BACKEND_URL: ""
    image: smart_scheduler_frontend:latest
    container_name: smart_scheduler_frontend
    ports:
      - "80:80"
    depends_on:
      - backend-svc

  backend-svc:
    build:
      context: ../BackEnd
    image: smart_scheduler_backend:latest
    container_name: smart_scheduler_backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DB_URL: ${DB_URL}
      WEAVIATE_HOST: weaviate
      WEAVIATE_HTTP_PORT: ${WEAVIATE_HTTP_PORT:-8080}
      WEAVIATE_GRPC_PORT: ${WEAVIATE_GRPC_PORT:-50051}
    depends_on:
      - db
      - weaviate

  db:
    image: mysql:8.0
    container_name: smart_scheduler_mysql
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZNAME}
    command: --default-time-zone=+08:00
    ports:
      - "3306:3306"
    volumes:
      - ./sql/nus_event.sql:/docker-entrypoint-initdb.d/nus_event.sql:ro
      - mysql_data:/var/lib/mysql

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.26.1
    container_name: smart_scheduler_weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      ENABLE_API_BASED_MODULES: "false"
    volumes:
      - weaviate_data:/var/lib/weaviate

volumes:
  mysql_data:
  weaviate_data: