services:

  frontend:
    build:
      context: ../FrontEnd
      args:
        VITE_BACKEND_URL: ""
    image: smart_scheduler_frontend:latest
    container_name: smart_scheduler_frontend
    ports:
      - "80:80"
    depends_on:
      - backend     

  backend:
    build:
      context: ../BackEnd
    image: smart_scheduler_backend:latest
    container_name: smart_scheduler_backend
    ports:
      - "8000:8000"
    env_file:
      - ../BackEnd/.env
    environment:
      DB_URL: mysql+pymysql://root:${MYSQL_PASSWORD:-root123}@db:3306/${MYSQL_DATABASE:-nus_event}
    depends_on:
      - db 

  db:
    image: mysql:8.1
    container_name: smart_scheduler_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nus_event}
    ports:
      - "3306:3306"
    volumes:
      - ./sql/nus_event.sql:/docker-entrypoint-initdb.d/nus_event.sql:ro
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: