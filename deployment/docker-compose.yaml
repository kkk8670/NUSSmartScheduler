version: "3.9"

services:

  frontend:
      build:
        context: ../FrontEnd        
        dockerfile: Dockerfile      
      image: smart_scheduler_frontend:latest
      container_name: smart_scheduler_frontend
      ports:
        - "5173:5173"              
      environment:
        VITE_BACKEND_URL: http://localhost:8000
      volumes:
        - ../FrontEnd:/app        

  backend:
    build:
      context: ../BackEnd    
      dockerfile: Dockerfile
    image: smart_scheduler_backend:latest
    container_name: smart_scheduler_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ../BackEnd/.env    
    depends_on:
      - db
    volumes:
      - ../BackEnd:/app   

  db:
    image: mysql:8.1
    container_name: smart_scheduler_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - ./nus_event.sql:/docker-entrypoint-initdb.d/nus_event.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: