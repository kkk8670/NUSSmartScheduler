# docker-compose.yaml – basic setting
#   pre run: ln -s ../.env .env
# 
#   dev (only DB):   docker compose up db
#   dev (DB + be):   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
#   prod (fe + be + DB):   docker compose up --build

services:

  frontend:
    build:
      context: ../FrontEnd
      args:
        VITE_BACKEND_URL: ""
    image: smart_scheduler_frontend:latest
    container_name: smart_scheduler_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ../BackEnd
    image: smart_scheduler_backend:latest
    container_name: smart_scheduler_backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DB_URL: ${DB_URL}
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: smart_scheduler_mysql
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZNAME}
    command: --default-time-zone=+08:00
    ports:
      - "3306:3306"
    volumes:
      - ./sql/nus_event.sql:/docker-entrypoint-initdb.d/nus_event.sql:ro
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: